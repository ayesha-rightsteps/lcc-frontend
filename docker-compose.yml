version: "3.9"

services:
  frontend:
    container_name: lcc-frontend
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - prod-net
      - proxy-network

networks:
  prod-net:
    driver: bridge
  proxy-network:
    external: true
